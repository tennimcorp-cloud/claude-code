<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kanban To Do List</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header>
      <div>
        <h1>Kanban To Do List</h1>
        <p>Organize tasks across To Do, In Progress, and Completed.</p>
      </div>
      <button id="openAddTask">Add Task</button>
    </header>

    <main>
      <section class="board" aria-label="Kanban board">
        <article class="column" data-status="todo">
          <h2>To Do</h2>
          <div class="column-count">0</div>
          <div class="task-list" id="todoColumn"></div>
        </article>

        <article class="column" data-status="inprogress">
          <h2>In Progress</h2>
          <div class="column-count">0</div>
          <div class="task-list" id="inprogressColumn"></div>
        </article>

        <article class="column" data-status="completed">
          <h2>Completed</h2>
          <div class="column-count">0</div>
          <div class="task-list" id="completedColumn"></div>
        </article>
      </section>
    </main>
  </div>

  <div class="modal hidden" id="taskModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">Add New Task</h2>
        <button class="close-button" id="closeModal" aria-label="Close dialog">×</button>
      </div>
      <form id="taskForm">
        <label>
          Title
          <input type="text" id="taskTitle" name="title" required maxlength="80" />
        </label>
        <label>
          Description
          <textarea id="taskDescription" name="description" rows="4" maxlength="240"></textarea>
        </label>
        <label>
          Priority
          <select id="taskPriority" name="priority">
            <option value="Low">Low</option>
            <option value="Medium" selected>Medium</option>
            <option value="High">High</option>
          </select>
        </label>
        <label>
          Tags (comma separated)
          <input type="text" id="taskTags" name="tags" placeholder="design, backend" />
        </label>
        <label>
          Status
          <select id="taskStatus" name="status">
            <option value="todo">To Do</option>
            <option value="inprogress">In Progress</option>
            <option value="completed">Completed</option>
          </select>
        </label>
        <div class="modal-actions">
          <button type="button" class="secondary" id="cancelTask">Cancel</button>
          <button type="submit">Save Task</button>
        </div>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
